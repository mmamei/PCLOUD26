<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script>
      function initSensor() {
           
        const url = "https://europe-west8-pcloud2026.cloudfunctions.net/predict_PM10";
        const data = {
          "PM10-1": 465,
          "PM10-2": 45,
          "PM10-3": 34,
          "weekend01": 0
        };
        
        $.post(url,{'data':JSON.stringify(data)},
                function(data,status){
                    console.log(data)
                    $('#output').text(JSON.stringify(data))
               })

      }
    </script>

</head>
<body>
<button onclick="initSensor()">Start</button>
<div id="output"></div>
</body>
</html>
