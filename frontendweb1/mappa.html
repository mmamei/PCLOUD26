	</head>
	<body class="homepage is-preload">
		<div id="page-wrapper">

			<!-- Header -->
				<div id="header-wrapper">
					<div id="header" class="container">

						<!-- Logo -->
							<h1 id="logo"><a href="index.html">Telephasic</a></h1>
					</div>

					<!-- Hero -->
						<section id="hero" class="container">
							<header>
								<h2>Mappa</h2>
								<div id="mapid" style="width: 1200px; height: 400px; margin: 0 auto;"></div>
							</header>
						</section>
				</div>
				<div class="wrapper">
						<section  class="container">
						Numero impianti: <span id="num_impianti"></span><br>
						</section>
				</div>

			

			<!-- Footer -->
				<div id="footer-wrapper">
					<div id="footer" class="container">
						
						<div class="row">
							<section class="col-12">
								<h3>Contact Info</h3>
								<p>Get in touch with us for more information about our IoT Telemetric Dashboard services.</p>
							</section>
						</div>
						<div class="row">
							<section class="col-12">
								<ul class="divided icons" style="display: flex; justify-content: space-around; flex-wrap: wrap; gap: 20px;">
									<br>
									<li class="icon brands fa-twitter"><a href="#"><span class="extra">twitter.com</span></a></li>
									<li class="icon brands fa-facebook-f"><a href="#"><span class="extra">facebook.com</span></a></li>
									<li class="icon brands fa-dribbble"><a href="#"><span class="extra">dribbble.com</span></a></li>
									<li class="icon brands fa-instagram"><a href="#"><span class="extra">instagram.com</span></a></li>
									<li class="icon brands fa-youtube"><a href="#"><span class="extra">youtube.com</span></a></li>
									<li class="icon brands fa-pinterest"><a href="#"><span class="extra">pinterest.com</span></a></li>
								</ul>
							</section>
						</div>
					</div>
					<div id="copyright" class="container">
						<ul class="menu">
							<li>&copy; Untitled. All rights reserved.</li><li>Design: <a href="http://html5up.net">HTML5 UP</a></li>
						</ul>
					</div>
				</div>

		</div>

		<!-- Scripts -->
			<script src="assets/js/jquery.min.js"></script>
			<script src="assets/js/jquery.dropotron.min.js"></script>
			<script src="assets/js/browser.min.js"></script>
			<script src="assets/js/breakpoints.min.js"></script>
			<script src="assets/js/util.js"></script>
			<script src="assets/js/main.js"></script>
			<script src="https://unpkg.com/leaflet@1.4.0/dist/leaflet.js"></script>


			<script>
				$(document).ready(function() {
					url = "https://raw.githubusercontent.com/mmamei/PCLOUD26/refs/heads/main/frontendweb1/data.json";
			
					$.getJSON(url, function(data) {
						console.log(data);
						$("#num_impianti").html(data.length);
						
						map = L.map('mapid').setView([data[0]['latitudine'], data[0]['longitudine']], 10);
						L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
						data.forEach(function(impianto) {
							L.marker([impianto['latitudine'], impianto['longitudine']]).addTo(map).bindPopup("<a href='graph.html?id=" + impianto['name'] + "' style='color: black;'>" + impianto['name'] + "</a>");
						});
					});
				});
			</script>

	</body>
</html>
