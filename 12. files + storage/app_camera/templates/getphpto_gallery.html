<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Foto trovate</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 1.5rem;
      line-height: 1.4;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.6rem;
      margin-bottom: 1rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1rem;
    }
    .card {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 0.6rem;
      background: #fff;
    }
    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 6px;
      background: #f5f5f5;
    }
    .meta {
      margin-top: 0.5rem;
      font-size: 0.9rem;
      color: #333;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>Foto dal {{ start_date }} al {{ end_date }}</h1>
    <a href="{{ url_for('getphpto') }}">Nuova ricerca</a>
  </div>

  {% if photos|length == 0 %}
    <p>Nessuna foto trovata nell'intervallo selezionato.</p>
  {% else %}
    <div class="grid">
      {% for photo in photos %}
        <article class="card">
          <img src="{{ photo.url }}" alt="{{ photo.filename }}">
          <div class="meta">
            <div><strong>Timestamp:</strong> {{ photo.timestamp }}</div>
            <div><strong>File:</strong> {{ photo.filename }}</div>
          </div>
        </article>
      {% endfor %}
    </div>
  {% endif %}
</body>
</html>
